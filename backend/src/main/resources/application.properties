# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# MySQL Datasource
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3307/finance_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# JWT
# ===============================
# 256-bit base64 secret - replace with your own in production (use an env var!)
jwt.secret=ZmluYW5jZS10cmFja2VyLXN1cGVyLXNlY3JldC1rZXktY2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tMjU2Yml0
jwt.expiration.ms=86400000

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=http://localhost:3000,https://personal-finance-tracker-frontend-ad3w.onrender.com

# ===============================
# Logging
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.financetracker=DEBUG
